    <span>输入0-1的不透明度值</span>
    <input type="text">
    <span>转化为16进制值:</span>
    
</body>
<script>

    function hex(num) {
        if (num > 255) {
            throw "'" + num + "'' is greater than 255(0xff);";
        }
        let str = Number(num).toString(16);
        return ("0" + str).slice(-2);
    }
</script>
